name: build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Lowercase image name. GHCR rejects uppercase, and the owner is "CappyTech",
# so this is hardcoded rather than derived from ${{ github.repository }}.
env:
  IMAGE: ghcr.io/cappytech/labs-web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # lets GITHUB_TOKEN push to GHCR — no PAT needed
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
