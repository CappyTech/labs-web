<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cappy Labs</title>
<meta name="description" content="Cappy Labs — a home for small experiments and self-hosted projects.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0e1a1f;
    --surface:   #14252c;
    --surface-2: #193037;
    --ink:       #dde9e7;
    --muted:     #6f8d90;
    --hairline:  rgba(255,255,255,0.08);
    --accent:    #e8a13c;   /* signal amber — the one bold note */
    --signal:    #5fb8c4;   /* cool cyan, used sparingly */
    --display: "Space Grotesk", system-ui, sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--display);
    line-height: 1.5;
    min-height: 100vh;
    /* faint instrument grid + vignette */
    background-image:
      linear-gradient(var(--hairline) 1px, transparent 1px),
      linear-gradient(90deg, var(--hairline) 1px, transparent 1px),
      radial-gradient(ellipse at 50% -10%, rgba(95,184,196,0.06), transparent 60%);
    background-size: 48px 48px, 48px 48px, 100% 100%;
  }

  .wrap { max-width: 920px; margin: 0 auto; padding: 0 24px; }

  /* ---- top rail ---- */
  .rail {
    border-bottom: 1px solid var(--hairline);
    background: rgba(14,26,31,0.6);
    backdrop-filter: blur(4px);
  }
  .rail .wrap {
    display: flex; align-items: center; gap: 12px;
    height: 44px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.04em;
    color: var(--muted);
  }
  .led {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--signal);
    box-shadow: 0 0 8px var(--signal);
    animation: pulse 2.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
  .rail .clock { margin-left: auto; color: var(--ink); }

  /* ---- hero ---- */
  header.hero { padding: 76px 0 40px; }
  .eyebrow {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
  }
  h1 {
    font-weight: 700;
    font-size: clamp(44px, 9vw, 88px);
    letter-spacing: -0.03em;
    line-height: 0.96;
  }
  h1 .amp { color: var(--accent); }
  .lede {
    margin-top: 20px;
    max-width: 46ch;
    color: var(--muted);
    font-size: 17px;
  }

  /* ---- modules ---- */
  .index-label {
    display: flex; align-items: baseline; gap: 14px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 40px 0 16px;
  }
  .index-label::after {
    content: ""; flex: 1; height: 1px;
    background: var(--hairline);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
    padding-bottom: 64px;
  }

  .module {
    position: relative;
    display: block;
    text-decoration: none;
    color: inherit;
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 10px;
    padding: 20px;
    transition: transform .18s ease, border-color .18s ease, background .18s ease;
  }
  .module:hover, .module:focus-visible {
    transform: translateY(-3px);
    border-color: rgba(232,161,60,0.5);
    background: var(--surface-2);
    outline: none;
  }
  .module:focus-visible { box-shadow: 0 0 0 2px var(--accent); }

  .module .callsign {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--signal);
  }
  .module .name {
    margin-top: 10px;
    font-size: 21px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .module .desc {
    margin-top: 6px;
    font-size: 14px;
    color: var(--muted);
    min-height: 2.6em;
  }
  .module .host {
    margin-top: 16px;
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }
  .module .arrow {
    margin-left: auto;
    color: var(--accent);
    transition: transform .18s ease;
  }
  .module:hover .arrow { transform: translateX(3px); }

  footer {
    border-top: 1px solid var(--hairline);
    padding: 22px 0 40px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  footer .sep { opacity: 0.4; }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

  <div class="rail">
    <div class="wrap">
      <span class="led" aria-hidden="true"></span>
      <span>STATION&nbsp;CAPPYLABS.UK</span>
      <span class="sep" aria-hidden="true">·</span>
      <span>NODE ONLINE</span>
      <span class="clock" id="clock">--:--:--</span>
    </div>
  </div>

  <div class="wrap">
    <header class="hero">
      <div class="eyebrow">Workbench &amp; signal hut</div>
      <h1>Cappy<span class="amp">·</span>Labs</h1>
      <p class="lede">A home for small experiments and the self-hosted things I keep running. Everything below is live on a node somewhere — pick a module.</p>
    </header>

    <div class="index-label">Active modules</div>
    <main class="grid" id="grid"></main>
  </div>

  <div class="wrap">
    <footer>
      <span>cappylabs.uk</span>
      <span class="sep">·</span>
      <span>built &amp; broken by cappy</span>
      <span class="sep">·</span>
      <span id="year"></span>
    </footer>
  </div>

<script>
  // ── Edit this list to add / remove modules ──────────────────────────
  // callsign: short tag · name: title · desc: one line · url: where it goes
  const MODULES = [
    { callsign: "DOCS",  name: "Paperless",  desc: "Document archive and OCR pipeline.",        url: "https://paperless.cappylabs.uk" },
    { callsign: "OPS",   name: "Portainer",  desc: "Container management for the stack.",        url: "https://portainer.cappylabs.uk" },
    { callsign: "STAT",  name: "Status",     desc: "Uptime and health for everything here.",     url: "https://status.cappylabs.uk" },
    { callsign: "NOTES", name: "Notebook",   desc: "Scratch notes and project logs.",            url: "https://notes.cappylabs.uk" },
  ];
  // ────────────────────────────────────────────────────────────────────

  const grid = document.getElementById("grid");
  grid.innerHTML = MODULES.map(m => `
    <a class="module" href="${m.url}">
      <div class="callsign">[${m.callsign}]</div>
      <div class="name">${m.name}</div>
      <div class="desc">${m.desc}</div>
      <div class="host">
        <span>${m.url.replace(/^https?:\/\//,"")}</span>
        <span class="arrow" aria-hidden="true">→</span>
      </div>
    </a>
  `).join("");

  // station clock (UK time)
  const clock = document.getElementById("clock");
  function tick(){
    clock.textContent = new Date().toLocaleTimeString("en-GB", { timeZone: "Europe/London" });
  }
  tick(); setInterval(tick, 1000);
  document.getElementById("year").textContent = new Date().getFullYear();
</script>
</body>
</html>
